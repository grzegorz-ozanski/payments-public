name: Run unit tests

on:
  push:
    branches: [ '*' ]
  pull_request:

env:
  COVERAGE_REPORT_FILE: payments/coverage.txt
  GIT_PUSH_SCRIPT: .github/scripts/git-push.ps1
  GH_ACTIONS_EMAIL: "github-actions@github.com"
  GH_ACTIONS_USER_NAME: "github-actions"
  MASTER_BRANCH: refs/heads/master
  README_PATH: payments/README.md
  REMOTE_DIR: upload/incoming
  COVERAGE_ARCHIVE: coverage.zip
  REPORTS_TS_HOST: 100.127.93.3
  REPORTS_TS_PORT: 2222

jobs:
  test:
    runs-on: ubuntu-latest

    permissions:
      # Give the default GITHUB_TOKEN write permission to commit and push the changed files back to the repository.
      contents: write

    steps:
    - name: Checkout current repo
      uses: actions/checkout@v4
      with:
        path: payments

    - name: Clone required browser repo
      uses: actions/checkout@v4
      with:
        repository: grzegorz-ozanski/browser
        path: browser
        token: ${{ secrets.BROWSER_REPO_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'

    - name: Install dependencies
      shell: pwsh
      working-directory: payments
      run: |
        pip install -r requirements-dev.txt

    - name: Prepare environment
      shell: pwsh
      run: |
        # Add browser repo to PYTHONPATH
        echo "PYTHONPATH=$env:GITHUB_WORKSPACE/browser" >> $env:GITHUB_ENV

    - name: Install Pyright
      shell: pwsh
      run: |
        npm install -g pyright

    - name: Run tests with coverage
      shell: pwsh
      run: |
        coverage run --data-file .coverage.payments -m pytest payments
        coverage report --data-file .coverage.payments > ${env:COVERAGE_REPORT_FILE}
        coverage html --data-file .coverage.payments
        coverage run --data-file .coverage.browser -m pytest browser
        coverage combine --data-file .coverage .coverage.payments .coverage.browser
        coverage report

    - name: Prepare HTML payments coverage report for upload
      if: always()
      shell: bash
      run: |
        mkdir -p payments/coverage
        rm -rf htmlcov/__pycache__
        mv htmlcov/* payments/coverage

    - name: Archive HTML coverage report
      if: always()
      shell: pwsh
      run: |
        Compress-Archive -Path payments -DestinationPath ${env:COVERAGE_ARCHIVE}

    - name: Add coverage report to summary
      if: always()
      shell: pwsh
      run: |
        echo '### 🧪 Test Coverage Summary' >> ${env:GITHUB_STEP_SUMMARY}
        echo '```' >> ${env:GITHUB_STEP_SUMMARY}
        cat ${env:COVERAGE_REPORT_FILE} >> ${env:GITHUB_STEP_SUMMARY}
        echo '```' >> ${env:GITHUB_STEP_SUMMARY}

    - name: Add mypy results to summary
      if: always()
      shell: pwsh
      run: |
        echo '### ✅ Static Analysis Summary' >> ${env:GITHUB_STEP_SUMMARY}
        echo '```' >> ${env:GITHUB_STEP_SUMMARY}
        mypy . --strict --ignore-missing-imports >> ${env:GITHUB_STEP_SUMMARY}
        echo '```' >> ${env:GITHUB_STEP_SUMMARY}

    - name: Add pyright payments results to summary
      if: always()
      shell: pwsh
      working-directory: payments
      run: |
        echo '### ✅ Pyright Summary' >> ${env:GITHUB_STEP_SUMMARY}
        echo '```' >> ${env:GITHUB_STEP_SUMMARY}
        pyright >> ${env:GITHUB_STEP_SUMMARY}

    - name: Add pyright browser results to summary
      if: always()
      shell: pwsh
      working-directory: browser
      run: |
        pyright >> ${env:GITHUB_STEP_SUMMARY}
        echo '```' >> ${env:GITHUB_STEP_SUMMARY}

    - name: Connect to Tailnet (ephemeral)
      uses: tailscale/github-action@v4
      with:
        oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
        oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
        tags: tag:ci
        ping: ${{ env.REPORTS_TS_HOST }}

    - name: Start ssh-agent
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.REPORTS_SSH_KEY }}

    - name: Upload coverage archive via SFTP
      shell: bash
      env:
        SFTP_HOST: ${{ env.REPORTS_TS_HOST }}
        SFTP_PORT: ${{ env.REPORTS_TS_PORT }}   # np. 22
        SFTP_USER: ${{ secrets.REPORTS_USER }}   # np. uploader

      run: |
        set -euo pipefail
    
        mkdir -p ~/.ssh
        ssh-keyscan -p "$SFTP_PORT" "$SFTP_HOST" >> ~/.ssh/known_hosts
    
        sftp -P "$SFTP_PORT" "$SFTP_USER@$SFTP_HOST" <<EOF
        mkdir $REMOTE_DIR
        cd $REMOTE_DIR
        put $COVERAGE_ARCHIVE
        bye
        EOF

    - name: "[SKIP REASON] Update coverage badge in README"
      if: github.ref != env.MASTER_BRANCH
      shell: pwsh
      run: |-
        $msg = "::notice ::Skipping 'Update coverage badge in README' step " +
               "because 'github.ref != ${{ env.MASTER_BRANCH }}'"
        echo $msg

    - name: Update coverage badge in README
      if: github.ref == env.MASTER_BRANCH
      shell: pwsh
      run: |
        $lines = Get-Content ${env:COVERAGE_REPORT_FILE} 
        $totalLine = $lines | Where-Object { $_ -match '^TOTAL\s' }
        if (-not $totalLine) {
          Write-Warning "No TOTAL line found in coverage report"
          exit 0
        }
        $columns = $totalLine -split '\s+'
        $percent = $columns[-1] -replace '%', ''

        if ([int]$percent -ge 90) {
          $color = 'brightgreen'
        } elseif ([int]$percent -ge 75) {
          $color = 'green'
        } elseif ([int]$percent -ge 60) {
          $color = 'yellow'
        } else {
          $color = 'red'
        }

        $badgePattern = '!\[Coverage\]\(https://img\.shields\.io/badge/coverage-[0-9]+%25-[a-z]+\)'
        $newBadge = "![Coverage](https://img.shields.io/badge/coverage-${percent}%25-${color})"

        (Get-Content ${env:README_PATH}) -replace $badgePattern, $newBadge | Set-Content ${env:README_PATH}

    - name: "[SKIP REASON] Commit updated README"
      if: github.ref != env.MASTER_BRANCH
      shell: pwsh
      run: |-
        $msg = "::notice ::Skipping 'Commit updated README' step " +
               "because 'github.ref != ${{ env.MASTER_BRANCH }}'"
        echo $msg

    - name: Commit updated README
      if: github.ref == env.MASTER_BRANCH
      working-directory: payments
      shell: pwsh
      run: |
        pwsh -File ${env:GIT_PUSH_SCRIPT} `
        ${env:README_PATH} `
        "Update coverage badge [skip ci]" `
        ${env:GH_ACTIONS_USER_NAME} `
        ${env:GH_ACTIONS_EMAIL}
